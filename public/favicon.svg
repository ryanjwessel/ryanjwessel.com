<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#020C1B"/>
  <!-- Geometric cube-frame / routed path mark in mint-green -->
  <!-- Front face outline -->
  <rect x="14" y="22" width="22" height="22" rx="2" fill="none" stroke="#47FBAB" stroke-width="2.5"/>
  <!-- Back face offset -->
  <rect x="28" y="12" width="22" height="22" rx="2" fill="none" stroke="#47FBAB" stroke-width="2" opacity="0.55"/>
  <!-- Connecting corners (top-right) -->
  <line x1="36" y1="22" x2="50" y2="12" stroke="#47FBAB" stroke-width="1.8" opacity="0.55"/>
  <!-- Routed execution path cutting through -->
  <polyline points="14,44 24,30 38,30 50,16" fill="none" stroke="#47FBAB" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Path endpoints / terminals -->
  <circle cx="14" cy="44" r="2.5" fill="#47FBAB"/>
  <circle cx="50" cy="16" r="2.5" fill="#47FBAB"/>
</svg>
